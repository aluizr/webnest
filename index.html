<!doctype html>
<html lang="pt-BR" class="light" style="color-scheme: light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ✅ Segurança adicional (via HTML, não HTTP headers) -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no" />
    
    <title>WebNest</title>
    <meta name="description" content="Um gerenciador elegante e seguro de links na web" />
    <meta name="author" content="Sua Empresa" />

    <!-- ✅ PWA Meta Tags -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WebNest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/pwa-192x192.svg" />

    <meta property="og:title" content="WebNest" />
    <meta property="og:description" content="Organize seus links favoritos com estilo e segurança" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://seu-dominio.com/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SeuUsername" />
    <meta name="twitter:image" content="https://seu-dominio.com/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    
    <!-- ✅ Script module seguro -->
    <script 
      type="module" 
      src="/src/main.tsx"
      crossorigin="anonymous"
    ></script>
    
    <!-- ✅ No-script fallback -->
    <noscript>
      <p>Esta aplicação requer JavaScript habilitado para funcionar.</p>
    </noscript>
  </body>
</html>
